<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFDF Transmission Viewer</title>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.112.0/Build/Cesium/';</script>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.112.0/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.112.0/Build/Cesium/Widgets/widgets.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d14;
      color: #c8d8f0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: #0c1220;
      border-bottom: 1px solid #1a3050;
      font-size: 11px;
      letter-spacing: 3px;
      color: #4a9eff;
      flex-shrink: 0;
    }

    .panels { display: flex; flex: 1; overflow: hidden; }

    #scatter-panel {
      width: 42%;
      min-width: 42%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1a3050;
      min-height: 0;
      overflow: hidden;
    }

    #globe-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .panel-label {
      padding: 5px 12px;
      font-size: 9px;
      letter-spacing: 2px;
      color: #4a9eff;
      background: #0c1220;
      border-bottom: 1px solid #1a3050;
      flex-shrink: 0;
      z-index: 10;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-label-text { flex-shrink: 0; }
    .panel-label-controls { display: flex; gap: 6px; align-items: center; }

    #scatter { flex: 1; min-height: 0; position: relative; overflow: hidden; }
    #scatter-chart { position: absolute; inset: 0; }
    #cesium-container { flex: 1; min-height: 0; }

    .cesium-widget-credits,
    .cesium-viewer-toolbar,
    .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer,
    .cesium-viewer-bottom { display: none !important; }

    #info-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(8, 13, 26, 0.92);
      border: 1px solid #1a3050;
      padding: 12px 16px;
      font-size: 10px;
      min-width: 230px;
      display: none;
      z-index: 20;
    }

    #info-panel.visible { display: block; }
    .info-row { margin-bottom: 5px; color: #5a7898; letter-spacing: 1px; }
    .info-value { color: #c8d8f0; }

    #reset-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 9px;
      color: #2a4060;
      letter-spacing: 1px;
      z-index: 20;
    }

    #view-toggle {
      position: absolute;
      top: 30px;
      right: 12px;
      z-index: 20;
      background: #0c1220;
      border: 1px solid #1a3050;
      color: #4a9eff;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 5px 10px;
      cursor: pointer;
    }

    #view-toggle:hover { background: #1a3050; }

    #lasso-controls {
      position: absolute;
      top: 30px;
      left: 12px;
      z-index: 20;
      display: flex;
      gap: 6px;
    }

    .ctrl-btn {
      background: #0c1220;
      border: 1px solid #1a3050;
      color: #4a9eff;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .ctrl-btn:hover  { background: #1a3050; }
    .ctrl-btn.active { background: #1a3050; border-color: #ff9600; color: #ff9600; }
    .ctrl-btn.exclude { color: #ff4444; border-color: #1a3050; }

    /* Persistent filter box overlays */
    #box-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }
    /* Temporary drag rectangle shown while drawing */
    #box-draw {
      position: absolute;
      pointer-events: none;
      display: none;
      box-sizing: border-box;
      z-index: 101;
    }

    /* x delete button on box filters */
    .box-del-btn {
      position: absolute;
      top: -1px;
      right: -1px;
      width: 16px;
      height: 16px;
      padding: 0;
      border: none;
      background: rgba(8,13,26,0.9);
      color: #8aa8d0;
      font-size: 13px;
      line-height: 15px;
      text-align: center;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .box-del-btn:hover { color: #ff4444; }

    /* Context menu for toggling/deleting a box or lasso filter */
    #filter-menu {
      position: fixed;
      z-index: 9999;
      display: none;
      flex-direction: column;
      gap: 4px;
      background: rgba(8,13,26,0.97);
      border: 1px solid #2a4060;
      padding: 6px;
    }
    #filter-menu.visible { display: flex; }

    /* Hide Plotly modebar */
    .modebar { display: none !important; }
  </style>
</head>
<body>

  <header>
    <span>HFDF // TRANSMISSION VIEWER</span>
    <span id="status">READY</span>
  </header>

  <div class="panels">
    <div id="scatter-panel">
      <div class="panel-label">
        <span class="panel-label-text">FREQUENCY (MHz) vs DATETIME</span>
        <div class="panel-label-controls">
          <button class="ctrl-btn" id="box-btn">BOX SELECT</button>
          <button class="ctrl-btn" id="box-clear-btn" style="display:none">x CLEAR</button>
        </div>
      </div>
      <div id="scatter">
        <div id="scatter-chart"></div>
        <div id="box-overlay"></div>
        <div id="box-draw"></div>
      </div>
    </div>
    <div id="globe-panel">
      <div class="panel-label">
        <span class="panel-label-text">GEOLOCATION // OSM TILE MAP</span>
      </div>
      <div id="cesium-container"></div>
      <div id="info-panel">
        <div class="info-row">UUID &nbsp;&nbsp;: <span class="info-value" id="info-uuid">--</span></div>
        <div class="info-row">BURST &nbsp;: <span class="info-value" id="info-burst">--</span></div>
        <div class="info-row">FREQ &nbsp;&nbsp;: <span class="info-value" id="info-freq">--</span></div>
        <div class="info-row">TIME &nbsp;&nbsp;: <span class="info-value" id="info-time">--</span></div>
        <div class="info-row">LAT/LON: <span class="info-value" id="info-latlon">--</span></div>
        <div class="info-row">MAJOR &nbsp;: <span class="info-value" id="info-major">--</span></div>
        <div class="info-row">MINOR &nbsp;: <span class="info-value" id="info-minor">--</span></div>
        <div class="info-row">ORIENT : <span class="info-value" id="info-orient">--</span></div>
      </div>
      <div id="reset-hint">SCATTER DBL-CLICK: RESET &nbsp;|&nbsp; LASSO: LEFT=ADD PT &nbsp; RIGHT=CLOSE</div>
      <button id="view-toggle">2D MAP</button>
      <div id="lasso-controls">
        <button class="ctrl-btn" id="lasso-btn">LASSO</button>
        <button class="ctrl-btn" id="lasso-clear-btn" style="display:none">x CLEAR</button>
      </div>
    </div>
  </div>

  <div id="filter-menu">
    <button class="ctrl-btn" id="filter-menu-toggle">INCLUDE</button>
    <button class="ctrl-btn" id="filter-menu-delete">x DELETE</button>
  </div>

  <script>
    // -- STATE --
    let transmissions = [];
    let items         = [];
    let entities      = [];
    let selectedIdx   = null;
    let plotDiv       = null;

    let dataXMin, dataXMax, dataYMin, dataYMax;

    // -- FILTER STATE --
    let lassoFilters = [];
    let boxFilters   = [];

    function isDotVisible(i) {
      const x = items[i].t.frequency / 1e6;
      const y = new Date(items[i].b.startTime).getTime();

      function inFilter(f) {
        if (f.dataX1 !== undefined) {
          return x >= f.dataX1 && x <= f.dataX2 && y >= f.dataY1 && y <= f.dataY2;
        }
        return f.set.has(i);
      }

      const all      = [...lassoFilters, ...boxFilters];
      const includes = all.filter(f =>  f.include);
      const excludes = all.filter(f => !f.include);
      if (includes.some(f => inFilter(f))) return true;
      if (excludes.some(f => inFilter(f))) return false;
      return includes.length === 0;
    }

    // -- PLOTLY DATA --
    function buildMarkerStyle() {
      const colors = [], sizes = [];
      items.forEach((item, i) => {
        const visible  = isDotVisible(i);
        const selected = i === selectedIdx;
        colors.push(selected ? '#ff9600' : visible ? '#4a9eff' : 'rgba(80,80,100,0.15)');
        sizes.push(selected ? 14 : visible ? 8 : 4);
      });
      return { colors, sizes };
    }

    // -- COORDINATE CONVERSION --
    // Use Plotly's built-in axis methods so date axes are handled correctly.
    function dataToPixel(dataX, dataY) {
      if (!plotDiv || !plotDiv._fullLayout) return null;
      const xa = plotDiv._fullLayout.xaxis;
      const ya = plotDiv._fullLayout.yaxis;
      return [xa._offset + xa.d2p(dataX), ya._offset + ya.l2p(dataY)];
    }

    function pixelToData(px, py) {
      if (!plotDiv || !plotDiv._fullLayout) return null;
      const xa = plotDiv._fullLayout.xaxis;
      const ya = plotDiv._fullLayout.yaxis;
      return [xa.p2d(px - xa._offset), ya.p2l(py - ya._offset)];
    }

    // -- CESIUM --
    Cesium.Ion.defaultAccessToken = '';

    const viewer = new Cesium.Viewer('cesium-container', {
      imageryProvider: false, terrainProvider: new Cesium.EllipsoidTerrainProvider(),
      animation: false, timeline: false, baseLayerPicker: false,
      geocoder: false, homeButton: false, sceneModePicker: false,
      navigationHelpButton: false, infoBox: false, selectionIndicator: false,
      skyBox: false, skyAtmosphere: false
    });

    const tileLayer = viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
        subdomains: ['a','b','c','d'], minimumLevel: 0, maximumLevel: 19,
        credit: '(c) CartoDB (c) OpenStreetMap contributors'
      })
    );
    tileLayer.brightness = 0.9;
    viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0d0d14');
    viewer.scene.globe.baseColor  = Cesium.Color.fromCssColorString('#0d0d14');

    let is3D = true;
    document.getElementById('view-toggle').addEventListener('click', () => {
      if (is3D) { viewer.scene.morphTo2D(1.0); document.getElementById('view-toggle').textContent = '3D GLOBE'; }
      else       { viewer.scene.morphTo3D(1.0); document.getElementById('view-toggle').textContent = '2D MAP'; }
      is3D = !is3D;
    });

    const MILES_TO_METERS = 1609.34;
    const COLOR_DEFAULT  = Cesium.Color.fromCssColorString('#4a9eff');
    const COLOR_SELECTED = Cesium.Color.fromCssColorString('#ff9600');
    const COLOR_DIM      = Cesium.Color.fromCssColorString('#505064').withAlpha(0.25);

    function updateCesiumColors() {
      entities.forEach((entity, i) => {
        const isSelected = i === selectedIdx, visible = isDotVisible(i);
        entity.point.color     = isSelected ? COLOR_SELECTED : visible ? COLOR_DEFAULT : COLOR_DIM;
        entity.point.pixelSize = isSelected ? 14 : visible ? 10 : 5;
        entity.ellipse.show    = isSelected && visible;
      });
    }

    // -- FILTER CONTEXT MENU --
    let selectedBoxIdx   = -1;
    let selectedLassoIdx = -1;
    let filterMenuType   = null;
    let filterMenuIdx    = -1;

    const filterMenuEl        = document.getElementById('filter-menu');
    const filterMenuToggleBtn = document.getElementById('filter-menu-toggle');
    const filterMenuDeleteBtn = document.getElementById('filter-menu-delete');

    function lassoPolygonColor(f) {
      return {
        fill:    (f.include ? Cesium.Color.fromCssColorString('#4a9eff') : Cesium.Color.fromCssColorString('#ff4444')).withAlpha(0.18),
        outline: (f.include ? Cesium.Color.fromCssColorString('#4a9eff') : Cesium.Color.fromCssColorString('#ff4444')).withAlpha(0.8)
      };
    }

    function applyLassoHighlight(idx, selected) {
      if (!lassoFilters[idx]) return;
      lassoFilters[idx].polygon.polygon.outlineColor = selected
        ? Cesium.Color.WHITE.withAlpha(0.95)
        : lassoPolygonColor(lassoFilters[idx]).outline;
    }

    function showFilterMenu(type, idx, clientX, clientY) {
      if (selectedBoxIdx !== -1) { selectedBoxIdx = -1; renderBoxOverlays(); }
      if (selectedLassoIdx !== -1) { applyLassoHighlight(selectedLassoIdx, false); selectedLassoIdx = -1; }

      filterMenuType = type;
      filterMenuIdx  = idx;

      if (type === 'box') {
        selectedBoxIdx = idx;
        renderBoxOverlays();
      } else {
        selectedLassoIdx = idx;
        applyLassoHighlight(idx, true);
      }

      const f = type === 'box' ? boxFilters[idx] : lassoFilters[idx];
      filterMenuToggleBtn.textContent = f.include ? 'INCLUDE' : 'EXCLUDE';
      filterMenuToggleBtn.classList.toggle('exclude', !f.include);

      const mw = 120, mh = 70;
      const x = Math.min(clientX + 8, window.innerWidth  - mw);
      const y = Math.min(clientY + 8, window.innerHeight - mh);
      filterMenuEl.style.left = x + 'px';
      filterMenuEl.style.top  = y + 'px';
      filterMenuEl.classList.add('visible');
    }

    function hideFilterMenu() {
      if (selectedBoxIdx   !== -1) { selectedBoxIdx = -1;   renderBoxOverlays(); }
      if (selectedLassoIdx !== -1) { applyLassoHighlight(selectedLassoIdx, false); selectedLassoIdx = -1; }
      filterMenuEl.classList.remove('visible');
      filterMenuType = null;
      filterMenuIdx  = -1;
    }

    filterMenuToggleBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (filterMenuIdx === -1) return;
      if (filterMenuType === 'box') {
        const f = boxFilters[filterMenuIdx];
        f.include = !f.include;
        filterMenuToggleBtn.textContent = f.include ? 'INCLUDE' : 'EXCLUDE';
        filterMenuToggleBtn.classList.toggle('exclude', !f.include);
        renderBoxOverlays();
        updateScatterColors();
      } else {
        const f = lassoFilters[filterMenuIdx];
        f.include = !f.include;
        const c = lassoPolygonColor(f);
        f.polygon.polygon.material = c.fill;
        filterMenuToggleBtn.textContent = f.include ? 'INCLUDE' : 'EXCLUDE';
        filterMenuToggleBtn.classList.toggle('exclude', !f.include);
        updateScatterColors();
      }
    });

    filterMenuDeleteBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (filterMenuIdx === -1) return;
      if (filterMenuType === 'box') {
        boxFilters.splice(filterMenuIdx, 1);
        selectedBoxIdx = -1;
        updateBoxClearBtn();
        renderBoxOverlays();
        updateScatterColors();
      } else {
        viewer.entities.remove(lassoFilters[filterMenuIdx].polygon);
        lassoFilters.splice(filterMenuIdx, 1);
        selectedLassoIdx = -1;
        updateLassoClearBtn();
        updateScatterColors();
      }
      filterMenuEl.classList.remove('visible');
      filterMenuType = null;
      filterMenuIdx  = -1;
    });

    let suppressMenuHide = false;
    document.addEventListener('click', e => {
      if (suppressMenuHide) { suppressMenuHide = false; return; }
      if (!filterMenuEl.contains(e.target)) hideFilterMenu();
    });

    const clickHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    clickHandler.setInputAction(function(click) {
      if (lassoMode) return;
      const picks = viewer.scene.drillPick(click.position);

      const dotPick = picks.find(p => {
        if (!Cesium.defined(p.id) || !Cesium.defined(p.id.description)) return false;
        const v = p.id.description.getValue ? p.id.description.getValue() : p.id.description;
        return !isNaN(parseInt(v, 10));
      });
      if (dotPick) {
        hideFilterMenu();
        const idx = parseInt(
          dotPick.id.description.getValue
            ? dotPick.id.description.getValue()
            : dotPick.id.description,
          10
        );
        selectTransmission(idx); zoomCesiumTo(idx); zoomScatterTo(idx);
        return;
      }

      const lassoPick = picks.find(p => Cesium.defined(p.id) && lassoFilters.some(f => f.polygon === p.id));
      if (lassoPick) {
        const lassoIdx = lassoFilters.findIndex(f => f.polygon === lassoPick.id);
        const r = viewer.scene.canvas.getBoundingClientRect();
        suppressMenuHide = true;
        showFilterMenu('lasso', lassoIdx, r.left + click.position.x, r.top + click.position.y);
        return;
      }

      hideFilterMenu();
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    clickHandler.setInputAction(function() {
      if (lassoMode) return;
      deselect();
      const pos = viewer.camera.positionCartographic;
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(
          Cesium.Math.toDegrees(pos.longitude),
          Cesium.Math.toDegrees(pos.latitude),
          8000000
        ),
        duration: 1.0
      });
    }, Cesium.ScreenSpaceEventType.LEFT_DOUBLE_CLICK);

    function zoomCesiumTo(idx) {
      const { b } = items[idx];
      viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(b.longitude, b.latitude, 600000), duration: 1.5 });
    }

    // -- LASSO (globe) --
    let lassoMode = false, lassoPoints = [], lassoPolyline = null, lassoVertices = [];

    const lassoBtnEl      = document.getElementById('lasso-btn');
    const lassoClearBtnEl = document.getElementById('lasso-clear-btn');
    const cesiumContainer = document.getElementById('cesium-container');

    function updateLassoClearBtn() {
      const n = lassoFilters.length;
      lassoClearBtnEl.style.display = n > 0 ? 'block' : 'none';
      lassoClearBtnEl.textContent   = `\u2715 CLEAR (${n})`;
    }

    lassoBtnEl.addEventListener('click', () => {
      lassoMode = !lassoMode;
      viewer.scene.screenSpaceCameraController.enableInputs = !lassoMode;
      lassoBtnEl.classList.toggle('active', lassoMode);
      cesiumContainer.style.cursor = lassoMode ? 'crosshair' : '';
      if (!lassoMode) clearLassoDrawing();
    });

    lassoClearBtnEl.addEventListener('click', () => {
      lassoFilters.forEach(f => viewer.entities.remove(f.polygon));
      lassoFilters = [];
      hideFilterMenu();
      updateLassoClearBtn();
      updateScatterColors();
    });

    function screenToGeo(screenPos) {
      const cartesian = viewer.camera.pickEllipsoid(screenPos, viewer.scene.globe.ellipsoid);
      if (!cartesian) return null;
      const carto = Cesium.Cartographic.fromCartesian(cartesian);
      return { lon: Cesium.Math.toDegrees(carto.longitude), lat: Cesium.Math.toDegrees(carto.latitude) };
    }

    function clearLassoDrawing() {
      lassoPoints = [];
      if (lassoPolyline) { viewer.entities.remove(lassoPolyline); lassoPolyline = null; }
      lassoVertices.forEach(e => viewer.entities.remove(e));
      lassoVertices = [];
    }

    function refreshLassoPolyline() {
      if (lassoPolyline) { viewer.entities.remove(lassoPolyline); lassoPolyline = null; }
      if (lassoPoints.length < 2) return;
      lassoPolyline = viewer.entities.add({
        polyline: {
          positions: [...lassoPoints.map(p => Cesium.Cartesian3.fromDegrees(p.lon, p.lat)),
                     Cesium.Cartesian3.fromDegrees(lassoPoints[0].lon, lassoPoints[0].lat)],
          width: 2,
          material: new Cesium.ColorMaterialProperty(Cesium.Color.YELLOW.withAlpha(0.85))
        }
      });
    }

    function addLassoVertex(screenPos) {
      const geo = screenToGeo(screenPos);
      if (!geo) return;
      lassoPoints.push(geo);
      lassoVertices.push(viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(geo.lon, geo.lat),
        point: { pixelSize: 7, color: Cesium.Color.YELLOW, outlineColor: Cesium.Color.BLACK, outlineWidth: 1 }
      }));
      refreshLassoPolyline();
    }

    function closeLasso() {
      if (lassoPoints.length < 3) { clearLassoDrawing(); return; }
      const savedPoints = [...lassoPoints];
      const inside = new Set();
      items.forEach((item, i) => {
        const { b } = item;
        let inPoly = false;
        for (let a = 0, b2 = savedPoints.length - 1; a < savedPoints.length; b2 = a++) {
          const xi = savedPoints[a].lon, yi = savedPoints[a].lat;
          const xj = savedPoints[b2].lon, yj = savedPoints[b2].lat;
          if (((yi > b.latitude) !== (yj > b.latitude)) &&
              (b.longitude < (xj - xi) * (b.latitude - yi) / (yj - yi) + xi))
            inPoly = !inPoly;
        }
        if (inPoly) inside.add(i);
      });
      clearLassoDrawing();
      const fill    = Cesium.Color.fromCssColorString('#4a9eff').withAlpha(0.18);
      const outline = Cesium.Color.fromCssColorString('#4a9eff').withAlpha(0.8);
      const polygon = viewer.entities.add({
        polygon: {
          hierarchy: new Cesium.PolygonHierarchy(savedPoints.map(p => Cesium.Cartesian3.fromDegrees(p.lon, p.lat))),
          material: fill, outline: true, outlineColor: outline, height: 0
        }
      });
      lassoFilters.push({ set: inside, include: true, polygon });
      updateLassoClearBtn();
      updateScatterColors();
      lassoMode = false;
      viewer.scene.screenSpaceCameraController.enableInputs = true;
      lassoBtnEl.classList.remove('active');
      cesiumContainer.style.cursor = '';
    }

    const lassoHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    lassoHandler.setInputAction(e => { if (!lassoMode) return; addLassoVertex(e.position); }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    lassoHandler.setInputAction(e => { if (!lassoMode) return; closeLasso(); }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

    // -- BOX SELECT --
    let boxSelectMode = false;
    let boxDragStart  = null;
    let boxDragActive = false;

    const boxBtnEl      = document.getElementById('box-btn');
    const boxClearBtnEl = document.getElementById('box-clear-btn');
    const boxOverlayEl  = document.getElementById('box-overlay');
    const boxDrawEl     = document.getElementById('box-draw');
    const scatterEl     = document.getElementById('scatter');

    function updateBoxClearBtn() {
      const n = boxFilters.length;
      boxClearBtnEl.style.display = n > 0 ? 'block' : 'none';
      boxClearBtnEl.textContent   = `\u2715 CLEAR (${n})`;
    }

    function renderBoxOverlays() {
      boxOverlayEl.innerHTML = '';
      if (!plotDiv || !plotDiv._fullLayout) return;
      boxFilters.forEach((f, idx) => {
        const p1 = dataToPixel(f.dataX1, f.dataY1);
        const p2 = dataToPixel(f.dataX2, f.dataY2);
        if (!p1 || !p2) return;
        const pxL = Math.min(p1[0], p2[0]), pxR = Math.max(p1[0], p2[0]);
        const pxT = Math.min(p1[1], p2[1]), pxB = Math.max(p1[1], p2[1]);
        const w = pxR - pxL, h = pxB - pxT;
        const color    = f.include ? '#4a9eff' : '#ff4444';
        const selected = idx === selectedBoxIdx;
        const bw       = selected ? 2 : 1;
        const bc       = selected ? '#fff' : color;

        const wrap = document.createElement('div');
        wrap.style.cssText = `position:absolute;pointer-events:none;` +
          `left:${pxL}px;top:${pxT}px;width:${w}px;height:${h}px;`;

        const bg = document.createElement('div');
        bg.style.cssText = `position:absolute;inset:0;background:${color}22;pointer-events:none;`;
        wrap.appendChild(bg);

        const del = document.createElement('button');
        del.className = 'box-del-btn';
        del.textContent = '\u00d7';
        const showDel = () => del.style.opacity = '1';
        const hideDel = () => del.style.opacity = '0';
        del.addEventListener('mouseenter', showDel);
        del.addEventListener('mouseleave', hideDel);
        del.addEventListener('click', e => {
          e.stopPropagation();
          boxFilters.splice(idx, 1);
          if (selectedBoxIdx === idx) {
            selectedBoxIdx = -1;
            filterMenuEl.classList.remove('visible');
            filterMenuType = null; filterMenuIdx = -1;
          } else if (selectedBoxIdx > idx) {
            selectedBoxIdx--;
            if (filterMenuType === 'box') filterMenuIdx--;
          }
          updateBoxClearBtn();
          renderBoxOverlays();
          updateScatterColors();
        });
        wrap.appendChild(del);

        const sides = [
          [0,    0,    w,  bw],
          [h-bw, 0,    w,  bw],
          [bw,   0,    bw, h - 2*bw],
          [bw,   w-bw, bw, h - 2*bw],
        ];
        sides.forEach(([t, l, sw, sh]) => {
          const side = document.createElement('div');
          side.style.cssText =
            `position:absolute;top:${t}px;left:${l}px;width:${sw}px;height:${sh}px;` +
            `background:${bc};pointer-events:auto;cursor:pointer;` +
            (selected ? `box-shadow:0 0 6px ${color};` : '');
          side.addEventListener('mouseenter', showDel);
          side.addEventListener('mouseleave', hideDel);
          side.addEventListener('click', e => {
            e.stopPropagation();
            showFilterMenu('box', idx, e.clientX, e.clientY);
          });
          wrap.appendChild(side);
        });

        boxOverlayEl.appendChild(wrap);
      });
    }

    boxBtnEl.addEventListener('click', () => {
      boxSelectMode = !boxSelectMode;
      boxBtnEl.classList.toggle('active', boxSelectMode);
      scatterEl.style.cursor = boxSelectMode ? 'crosshair' : '';
      if (plotDiv) {
        Plotly.relayout(plotDiv, { dragmode: boxSelectMode ? false : 'zoom' });
      }
    });

    boxClearBtnEl.addEventListener('click', () => {
      boxFilters = [];
      selectedBoxIdx = -1;
      hideFilterMenu();
      updateBoxClearBtn();
      renderBoxOverlays();
      updateScatterColors();
    });

    scatterEl.addEventListener('mousedown', (e) => {
      if (!boxSelectMode) return;
      const rect = scatterEl.getBoundingClientRect();
      boxDragStart  = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      boxDragActive = false;
    });

    document.addEventListener('mousemove', (e) => {
      if (!boxSelectMode || !boxDragStart) return;
      const rect = scatterEl.getBoundingClientRect();
      const cur  = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      const dx = cur.x - boxDragStart.x, dy = cur.y - boxDragStart.y;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        boxDragActive = true;
        boxDrawEl.style.cssText =
          `position:absolute;pointer-events:none;box-sizing:border-box;z-index:101;display:block;` +
          `left:${Math.min(boxDragStart.x, cur.x)}px;top:${Math.min(boxDragStart.y, cur.y)}px;` +
          `width:${Math.abs(dx)}px;height:${Math.abs(dy)}px;` +
          `border:1px solid #4a9eff;background:#4a9eff22;`;
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (!boxSelectMode || !boxDragStart) return;
      boxDrawEl.style.display = 'none';

      if (boxDragActive && plotDiv && plotDiv._fullLayout) {
        const rect = scatterEl.getBoundingClientRect();
        const end  = { x: e.clientX - rect.left, y: e.clientY - rect.top };

        const pxL = Math.min(boxDragStart.x, end.x), pxR = Math.max(boxDragStart.x, end.x);
        const pxT = Math.min(boxDragStart.y, end.y), pxB = Math.max(boxDragStart.y, end.y);

        const inside = new Set();
        items.forEach((item, i) => {
          const pt = dataToPixel(
            item.t.frequency / 1e6,
            new Date(item.b.startTime).getTime()
          );
          if (!pt) return;
          if (pt[0] >= pxL && pt[0] <= pxR && pt[1] >= pxT && pt[1] <= pxB) inside.add(i);
        });

        if (inside.size > 0) {
          let dataX1, dataX2, dataY1, dataY2;
          const tl = pixelToData(pxL, pxT);
          const br = pixelToData(pxR, pxB);
          if (tl && br) {
            dataX1 = Math.min(tl[0], br[0]); dataX2 = Math.max(tl[0], br[0]);
            dataY1 = Math.min(tl[1], br[1]); dataY2 = Math.max(tl[1], br[1]);
          } else {
            const arr = [...inside];
            dataX1 = Math.min(...arr.map(i => items[i].t.frequency / 1e6));
            dataX2 = Math.max(...arr.map(i => items[i].t.frequency / 1e6));
            dataY1 = Math.min(...arr.map(i => new Date(items[i].b.startTime).getTime()));
            dataY2 = Math.max(...arr.map(i => new Date(items[i].b.startTime).getTime()));
            const xPad = (dataX2 - dataX1) * 0.05 || 0.5;
            const yPad = (dataY2 - dataY1) * 0.05 || 60000;
            dataX1 -= xPad; dataX2 += xPad; dataY1 -= yPad; dataY2 += yPad;
          }
          boxFilters.push({ include: true, dataX1, dataX2, dataY1, dataY2 });
          updateBoxClearBtn();
          renderBoxOverlays();
          updateScatterColors();
          showFilterMenu('box', boxFilters.length - 1, e.clientX, e.clientY);
        }
      }

      boxDragStart = null;
      boxDragActive = false;
    });

    // -- LOAD DATA --
    document.getElementById('status').textContent = 'LOADING\u2026';
    fetch('data.json')
      .then(r => r.json())
      .then(data => {
        transmissions = data.transmissions;
        items = [];
        transmissions.forEach((t, txIdx) => {
          t.bursts.forEach((b, burstIdx) => items.push({ txIdx, burstIdx, t, b }));
        });

        dataXMin = Math.min(...items.map(d => d.t.frequency / 1e6));
        dataXMax = Math.max(...items.map(d => d.t.frequency / 1e6));
        dataYMin = Math.min(...items.map(d => new Date(d.b.startTime).getTime()));
        dataYMax = Math.max(...items.map(d => new Date(d.b.startTime).getTime()));

        entities = items.map((item, i) => {
          const { b } = item;
          return viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(b.longitude, b.latitude),
            point: { pixelSize: 10, color: COLOR_DEFAULT, outlineColor: Cesium.Color.fromCssColorString('#0c1220'), outlineWidth: 2, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
            ellipse: {
              show: false,
              semiMajorAxis: Math.max(b.major_axis, b.minor_axis) * MILES_TO_METERS,
              semiMinorAxis: Math.min(b.major_axis, b.minor_axis) * MILES_TO_METERS,
              rotation: Cesium.Math.toRadians(-b.orientation),
              material: COLOR_SELECTED.withAlpha(0.25), outline: true, outlineColor: COLOR_SELECTED, outlineWidth: 2, height: 0
            },
            description: String(i)
          });
        });

        // -- PLOTLY INIT --
        requestAnimationFrame(() => {
          plotDiv = document.getElementById('scatter-chart');

          const { colors, sizes } = buildMarkerStyle();

          Plotly.newPlot(plotDiv, [{
            x: items.map(item => item.t.frequency / 1e6),
            y: items.map(item => item.b.startTime),
            mode: 'markers',
            type: 'scatter',
            marker: {
              color: colors,
              size: sizes,
              symbol: 'diamond',
              line: { color: '#0c1220', width: 1 }
            },
            hoverinfo: 'text',
            text: items.map(item =>
              `<b>${(item.t.frequency / 1e6).toFixed(3)} MHz</b><br>${item.b.startTime.replace('T',' ').replace('Z',' UTC')}`
            ),
            hoverlabel: {
              bgcolor: 'rgba(8,13,26,0.92)',
              bordercolor: '#1a3050',
              font: { color: '#c8d8f0', size: 10, family: 'Courier New' }
            }
          }], {
            paper_bgcolor: '#0c1525',
            plot_bgcolor: '#0c1525',
            margin: { l: 85, r: 20, t: 20, b: 55 },
            xaxis: {
              title: { text: 'FREQUENCY (MHz)', font: { color: '#4a9eff', size: 10, family: 'Courier New' }, standoff: 15 },
              color: '#8aa8d0',
              gridcolor: '#1a3050',
              linecolor: '#1a3050',
              zerolinecolor: '#1a3050',
              tickfont: { color: '#8aa8d0', family: 'Courier New', size: 9 }
            },
            yaxis: {
              title: { text: 'DATETIME (UTC)', font: { color: '#4a9eff', size: 10, family: 'Courier New' }, standoff: 15 },
              type: 'date',
              color: '#8aa8d0',
              gridcolor: '#1a3050',
              linecolor: '#1a3050',
              zerolinecolor: '#1a3050',
              tickfont: { color: '#8aa8d0', family: 'Courier New', size: 9 }
            },
            hovermode: 'closest',
            dragmode: 'zoom'
          }, {
            responsive: true,
            displayModeBar: false,
            scrollZoom: true,
            doubleClick: false
          });

          plotDiv.on('plotly_click', function(data) {
            if (!data || !data.points || data.points.length === 0) return;
            const idx = data.points[0].pointIndex;
            selectTransmission(idx);
            zoomCesiumTo(idx);
            zoomScatterTo(idx);
          });

          plotDiv.on('plotly_doubleclick', function() {
            deselect();
            resetScatterZoom();
            return false;
          });

          plotDiv.on('plotly_relayout', function() {
            renderBoxOverlays();
          });

          window.addEventListener('resize', () => { renderBoxOverlays(); });
        });

        document.getElementById('status').textContent = `READY \u2014 ${transmissions.length} TX | ${items.length} BURSTS`;
      })
      .catch(err => {
        document.getElementById('status').textContent = 'ERR: serve via HTTP server';
        console.error(err);
      });

    // -- HELPERS --
    function zoomScatterTo(idx) {
      if (!plotDiv) return;
      const { t, b } = items[idx];
      const dt = new Date(b.startTime).getTime();
      Plotly.relayout(plotDiv, {
        'xaxis.range': [(t.frequency - 3e6) / 1e6, (t.frequency + 3e6) / 1e6],
        'yaxis.range': [new Date(dt - 45 * 60000).toISOString(), new Date(dt + 45 * 60000).toISOString()]
      });
    }

    function resetScatterZoom() {
      if (!plotDiv) return;
      const xPad = (dataXMax - dataXMin) * 0.05 || 1;
      const yPad = (dataYMax - dataYMin) * 0.05 || 60000;
      Plotly.relayout(plotDiv, {
        'xaxis.range': [dataXMin - xPad, dataXMax + xPad],
        'yaxis.range': [new Date(dataYMin - yPad).toISOString(), new Date(dataYMax + yPad).toISOString()]
      });
    }

    function updateInfoPanel(idx) {
      const { t, b, burstIdx } = items[idx];
      document.getElementById('info-uuid').textContent   = t.transmissionUUID ? t.transmissionUUID.substring(0, 13) + '\u2026' : '--';
      document.getElementById('info-burst').textContent  = `${burstIdx + 1} / ${t.numBursts}`;
      document.getElementById('info-freq').textContent   = `${(t.frequency / 1e6).toFixed(3)} MHz`;
      document.getElementById('info-time').textContent   = b.startTime.replace('T', ' ').replace('Z', ' UTC');
      document.getElementById('info-latlon').textContent = `${b.latitude.toFixed(3)}, ${b.longitude.toFixed(3)}`;
      document.getElementById('info-major').textContent  = `${b.major_axis} mi`;
      document.getElementById('info-minor').textContent  = `${b.minor_axis} mi`;
      document.getElementById('info-orient').textContent = `${b.orientation}\u00b0`;
      document.getElementById('info-panel').classList.add('visible');
    }

    function updateScatterColors() {
      if (plotDiv) {
        const { colors, sizes } = buildMarkerStyle();
        Plotly.restyle(plotDiv, {
          'marker.color': [colors],
          'marker.size': [sizes]
        }, [0]);
      }
      updateCesiumColors();
    }

    function selectTransmission(idx) {
      selectedIdx = idx;
      updateCesiumColors();
      updateScatterColors();
      updateInfoPanel(idx);
      const { txIdx, burstIdx, t } = items[idx];
      document.getElementById('status').textContent = `TX ${txIdx + 1}/${transmissions.length} \u00b7 BURST ${burstIdx + 1}/${t.numBursts}`;
    }

    function deselect() {
      selectedIdx = null;
      updateCesiumColors();
      updateScatterColors();
      document.getElementById('info-panel').classList.remove('visible');
      document.getElementById('status').textContent = 'READY';
    }
  </script>
</body>
</html>
